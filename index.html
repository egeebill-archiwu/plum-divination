  <!-- 系統啟動錯誤監測與應急復原工具 (System Load Error Boundary) -->
  <div id="error-display" style="display:none; padding: 24px; background: #0c0f0d; color: #ff6b6b; border: 3px solid #d4af37; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; position: fixed; top: 10%; left: 5%; right: 5%; z-index: 99999; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7); max-width: 600px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 16px;">
      <span style="font-size: 40px; color: #d4af37;">☯</span>
      <h3 style="margin: 8px 0; font-family: serif; color: #e5c158; font-size: 20px; font-weight: bold;">系統載入失敗 / System Load Error</h3>
      <div style="height: 1px; width: 60px; background: rgba(212, 175, 55, 0.3); margin: 8px auto;"></div>
    </div>
    <p style="font-size: 13px; color: #a3a3a3; line-height: 1.6; margin-bottom: 12px; font-family: serif; text-align: center;">
      系統在啟動時遇到錯誤，這通常是由於瀏覽器安全性限制、Service Worker 快取異常或 CDN 連線被封鎖所致。您可以點擊下方按鈕嘗試修復：
    </p>
    <pre id="error-message" style="white-space: pre-wrap; font-family: monospace; font-size: 11px; background: rgba(0, 0, 0, 0.4); padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 107, 107, 0.2); max-height: 150px; overflow-y: auto; color: #ef4444; margin-bottom: 20px; text-align: left;"></pre>
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <button onclick="location.reload(true)" style="padding: 10px 20px; background: #d4af37; color: #080a09; border: none; font-weight: bold; cursor: pointer; border-radius: 30px; font-size: 12px; transition: all 0.2s;">強制重新整理 (Force Reload)</button>
      <button onclick="clearSystemCache()" style="padding: 10px 20px; background: #ef4444; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 30px; font-size: 12px; transition: all 0.2s;">清除系統快取並重設 (Reset Cache)</button>
    </div>
  </div>
  <script>
    (function() {
      var errMsgs = [];
      function showUI(msg) {
        if (errMsgs.indexOf(msg) !== -1) return;
        errMsgs.push(msg);
        var disp = document.getElementById('error-display');
        var text = document.getElementById('error-message');
        if (disp && text) {
          disp.style.display = 'block';
          text.textContent = errMsgs.join('\n');
        }
      }
      
      // 1. 監聽資源載入失敗 (如 CDN 腳本被阻擋)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          showUI('無法載入資源 / Failed to load: ' + (e.target.src || e.target.href));
        }
      }, true);
      
      // 2. 監聽 JavaScript 執行期異常
      window.onerror = function(message, source, lineno, colno, error) {
        var cleanSource = source ? source.split('/').pop() : 'inline';
        showUI('執行錯誤: ' + message + ' (' + cleanSource + ':' + lineno + ':' + colno + ')');
        return false;
      };
      
      // 3. 監聽未處理的 Promise 拒絕
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason ? (e.reason.message || e.reason) : 'Unknown reason';
        showUI('非同步錯誤: ' + reason);
      });
      
      // 4. 快取清除與重設工具
      window.clearSystemCache = function() {
        // 清除 LocalStorage 歷史紀錄 (預防歷史資料格式損毀)
        try {
          localStorage.removeItem('divination_history');
          console.log('History cache removed');
        } catch(e) {}
        
        // 註銷 Service Worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
          });
        }
        
        // 清除 Cache Storage
        if ('caches' in window) {
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(name) {
              return caches.delete(name);
            }));
          }).then(function() {
            alert('系統快取及歷史紀錄已清除成功！正在重新載入系統...');
            location.reload(true);
          }).catch(function(err) {
            alert('快取清除失敗，請嘗試手動重新整理網頁: ' + err);
          });
        } else {
          alert('本設備不支援 Cache 控制，已重啟網頁...');
          location.reload(true);
        }
      };

      // 5. 偵測 React 是否成功掛載 (2.5秒後若 root 內無節點則判定失敗)
      window.addEventListener('load', function() {
        setTimeout(function() {
          var rootEl = document.getElementById('root');
          if (rootEl && !rootEl.hasChildNodes()) {
            showUI('偵測到應用程式未啟動 / App failed to render. (可能原因：Babel 解析錯誤或 LocalStorage 快取格式毀損，請點擊「清除系統快取並重設」按鈕修復)');
          }
        }, 2500);
      });
    })();
  </script>

      0% { transform: translate(0, -60px) rotateX(0deg) rotateY(0deg) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate(-70px, 120px) rotateX(720deg) rotateY(360deg) scale(1); opacity: 0; }

      perspective: 1000px;
      transform-style: preserve-3d;

      width: 46px;

            {/* 動態按鈕控制 */}
            <div className="flex gap-3 justify-center mt-3">
              {tossStep < 6 ? (
                <>
                  {!isCoinShaking && !isCoinTossing ? (
                    <button
                      onClick={startShakingCoins}
                      className="px-6 py-2 bg-gradient-to-r from-gold-600 to-gold-400 text-black text-xs font-bold rounded-full font-serif shadow-lg active:scale-95 transition-all flex items-center gap-1.5"
                    >
                      <span className="text-sm">🐢</span> 搖晃龜殼
                    </button>
                  ) : isCoinShaking && !isCoinTossing ? (
                    <button
                      onClick={throwCoins}
                      className="px-6 py-2 bg-gradient-to-r from-amber-500 to-yellow-400 text-black text-xs font-bold rounded-full font-serif shadow-lg active:scale-95 transition-all flex items-center gap-1.5 animate-pulse"
                    >
                      <span className="text-sm">🪙</span> 擲出銅錢
                    </button>
                  ) : (
                    <button
                      disabled
                      className="px-6 py-2 bg-neutral-800 text-neutral-500 text-xs font-bold rounded-full font-serif cursor-not-allowed flex items-center gap-1.5"
                    >
                      <svg className="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5" /></svg>
                      銅錢翻滾中
                    </button>
                  )}
                </>
              ) : (
                <button
                  onClick={handleReset}
                  className="px-6 py-2 bg-white/5 border border-white/10 text-neutral-300 hover:text-gold-300 text-xs font-bold rounded-full font-serif active:scale-95 transition-all flex items-center gap-1.5"
                >
                  <span className="text-sm">🔄</span> 重起新卦
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // 核心 React 應用組件
    const PlumBlossomApp = () => {
      // 狀態設定
      const [mode, setMode] = useState('time'); // 'time', 'number', 'char', 'random', 'coin'
      const [question, setQuestion] = useState('');
      const [nums, setNums] = useState({ n1: '', n2: '', n3: '' });
      const [charText, setCharText] = useState('');
      
      // 時間起卦的預設日期時間
      const [dateTime, setDateTime] = useState(() => {
        const now = new Date();
        const tzoffset = now.getTimezoneOffset() * 60000;
        return (new Date(now - tzoffset)).toISOString().slice(0, 16);
      });
      
      const [result, setResult] = useState(null);
      const [isAnimating, setIsAnimating] = useState(false);
      const [tickerGua, setTickerGua] = useState({ s: '☰', x: '☷' });
      const [aiAnalysis, setAiAnalysis] = useState(null);
      const [copied, setCopied] = useState(false);
      const [showInfo, setShowInfo] = useState(false);
      const [infoTab, setInfoTab] = useState('general'); // 'general', 'time', 'number', 'char', 'random', 'coin'
      const [showSettings, setShowSettings] = useState(false);
      const [selectedHistory, setSelectedHistory] = useState(null);

      // 金錢卦專屬狀態
      const [tossStep, setTossStep] = useState(0); // 0: 尚未開始, 1-6: 當前第幾爻
      const [coinTossHistory, setCoinTossHistory] = useState([]); // 每次投擲硬幣的結果陣列
      const [isCoinShaking, setIsCoinShaking] = useState(false); // 龜殼搖動中
      const [isCoinTossing, setIsCoinTossing] = useState(false); // 硬幣拋擲中
      const [currentTossCoins, setCurrentTossCoins] = useState([0, 0, 0]); // 當前三枚硬幣 (0:字/正面, 1:幕/反面)
      const [coinTargetRotations, setCoinTargetRotations] = useState([
        { rx: '720deg', ry: '720deg' },
        { rx: '720deg', ry: '720deg' },
        { rx: '720deg', ry: '720deg' }
      ]); // 三枚硬幣落定時的旋轉角設定
      
      // API 金鑰與模型設定
      const [customApiKey, setCustomApiKey] = useState(() => safeLocalStorage.getItem('gemini_api_key') || '');
      const [selectedModel, setSelectedModel] = useState(() => {
        const stored = safeLocalStorage.getItem('gemini_model');
        if (stored === 'gemini-1.5-flash') return 'gemini-2.0-flash';
        if (stored === 'gemini-1.5-pro') return 'gemini-2.5-pro';
        if (stored === 'gemini-flash-latest') return 'gemini-2.0-flash';
        if (stored === 'gemini-pro-latest') return 'gemini-2.5-pro';
        return stored || 'gemini-2.0-flash';
      });
      const [history, setHistory] = useState(() => {
        try {
          const stored = JSON.parse(safeLocalStorage.getItem('divination_history'));
          return Array.isArray(stored) ? stored : [];
        } catch {
          return [];
        }
      });
      
      // 音效與動畫計時器
      const audioContextRef = useRef(null);
      const soundIntervalRef = useRef(null);

      // 動畫跑馬燈與結果同步
      useEffect(() => {
        let ticker;
        if (isAnimating) {
          ticker = setInterval(() => {
            setTickerGua({
              s: BAGUA[Math.floor(Math.random() * 8)].symbol,
              x: BAGUA[Math.floor(Math.random() * 8)].symbol
            });
          }, 80);
        } else if (result) {
          setTickerGua({
            s: result.shangGua.symbol,
            x: result.xiaGua.symbol
          });
        }
        return () => clearInterval(ticker);
      }, [isAnimating, result]);

      // 儲存歷史紀錄至 localStorage
      useEffect(() => {
        safeLocalStorage.setItem('divination_history', JSON.stringify(history));
      }, [history]);

      // 儲存金鑰與模型設定
      const saveSettings = (key, model) => {
        setCustomApiKey(key);
        setSelectedModel(model);
        safeLocalStorage.setItem('gemini_api_key', key);
        safeLocalStorage.setItem('gemini_model', model);
        setShowSettings(false);
      };

      // 音效播放
      const playDivinationSound = () => {
        try {
          if (!audioContextRef.current) {
            audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          const ctx = audioContextRef.current;
          if (ctx.state === 'suspended') ctx.resume();

          soundIntervalRef.current = setInterval(() => {
            const now = ctx.currentTime;
            
            // 木質龜殼搖晃聲 (Wood impact)
            const woodOsc = ctx.createOscillator();
            const woodGain = ctx.createGain();
            woodOsc.type = 'sine';
            woodOsc.frequency.setValueAtTime(140 + Math.random() * 60, now);
            woodGain.gain.setValueAtTime(0.08, now);
            woodGain.gain.exponentialRampToValueAtTime(0.005, now + 0.12);
            woodOsc.connect(woodGain); 
            woodGain.connect(ctx.destination);
            woodOsc.start(now); 
            woodOsc.stop(now + 0.12);

            // 銅錢金屬撞擊聲 (Metal clink)
            const coinOsc = ctx.createOscillator();
            const coinGain = ctx.createGain();
            coinOsc.type = 'triangle';
            coinOsc.frequency.setValueAtTime(800 + Math.random() * 1200, now);
            coinGain.gain.setValueAtTime(0.03, now);
            coinGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            coinOsc.connect(coinGain); 
            coinGain.connect(ctx.destination);
            coinOsc.start(now); 
            coinOsc.stop(now + 0.06);
          }, 100);
        } catch (e) { 
          console.error("Audio Web API initialization error", e); 
        }
      };

      const stopDivinationSound = () => {
        if (soundIntervalRef.current) {
          clearInterval(soundIntervalRef.current);
          soundIntervalRef.current = null;
        }
      };

      // 農曆與地支換算核心函數 (使用 Intl API)
      const getLunarDetails = (dateObj) => {
        // 中文數字解析輔助函數
        const parseChineseMonth = (str) => {
          if (!str) return 1;
          const digits = str.replace(/[^\d]/g, '');
          if (digits) return parseInt(digits);
          
          const cnMonths = {
            '正': 1, '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, 
            '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12, '腊': 12, '冬': 11
          };
          
          for (const key in cnMonths) {
            if (str.includes(key)) {
              if (key === '十') {
                if (str.includes('十一')) return 11;
                if (str.includes('十二')) return 12;
              }
              return cnMonths[key];
            }
          }
          return 1;
        };

        const parseChineseDay = (str) => {
          if (!str) return 1;
          const digits = str.replace(/[^\d]/g, '');
          if (digits) return parseInt(digits);
          
          if (str.includes('初')) {
            const char = str.replace('初', '').trim();
            const map = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
            return map[char] || 1;
          }
          if (str.includes('廿')) {
            const char = str.replace('廿', '').trim();
            const map = { '一': 21, '二': 22, '三': 23, '四': 24, '五': 25, '六': 26, '七': 27, '八': 28, '九': 29, '十': 20 };
            if (char === '') return 20;
            return map[char] || 20;
          }
          if (str.includes('卅')) {
            return 30;
          }
          if (str.startsWith('十')) {
            const char = str.replace('十', '').trim();
            const map = { '一': 11, '二': 12, '三': 13, '四': 14, '五': 15, '六': 16, '七': 17, '八': 18, '九': 19 };
            if (char === '') return 10;
            return map[char] || 10;
          }
          
          const simpleMap = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
          for (const key in simpleMap) {
            if (str.includes(key)) return simpleMap[key];
          }
          return 1;
        };

        try {
          // 先嘗試以 en-US 取得純數字陰曆
          const formatter = new Intl.DateTimeFormat('en-US-u-ca-chinese', {
            year: 'numeric',
            month: 'numeric',
            day: 'numeric'
          });
          const parts = formatter.formatToParts(dateObj);
          
          let lunarYear = dateObj.getFullYear();
          let month = 1;
          let day = 1;
          
          for (const part of parts) {
            if (part.type === 'year') {
              const yearNum = parseInt(part.value.replace(/[^\d]/g, ''));
              if (yearNum) lunarYear = yearNum;
            } else if (part.type === 'month') {
              const parsedMonth = parseInt(part.value.replace(/[^\d]/g, ''));
              if (parsedMonth) month = parsedMonth;
            } else if (part.type === 'day') {
              const parsedDay = parseInt(part.value.replace(/[^\d]/g, ''));
              if (parsedDay) day = parsedDay;
            }
          }
          
          // 如果 en-US 輸出並非數字（防禦性處理），改用 zh-CN 並進行中文數字解析
          if (isNaN(month) || month === 1 && day === 1) {
            const zhFormatter = new Intl.DateTimeFormat('zh-CN-u-ca-chinese', {
              year: 'numeric',
              month: 'numeric',
              day: 'numeric'
            });
            const zhParts = zhFormatter.formatToParts(dateObj);
            for (const part of zhParts) {
              if (part.type === 'year') {
                const yearNum = parseInt(part.value.replace(/[^\d]/g, ''));
                if (yearNum) lunarYear = yearNum;
              } else if (part.type === 'month') {
                month = parseChineseMonth(part.value);
              } else if (part.type === 'day') {
                day = parseChineseDay(part.value);
              }
            }
          }
          
          // 計算地支年數 (子=1, 丑=2 ... 亥=12)
          // 2020是子年 (1), 2026是午年 (7)
          const yearBranchIndex = (lunarYear - 3) % 12 || 12;
          return { yearBranchIndex, month, day };
        } catch (e) {
          // 瀏覽器不支援時的簡單降級方案 (以西元日期簡單哈希)
          const yearBranchIndex = (dateObj.getFullYear() - 3) % 12 || 12;
          const month = dateObj.getMonth() + 1;
          const day = dateObj.getDate();
          return { yearBranchIndex, month, day };
        }
      };

      // 取得時辰地支指數 (1-12)
      const getHourBranchIndex = (hour) => {
        if (hour >= 23 || hour < 1) return 1;  // 子
        if (hour >= 1 && hour < 3) return 2;   // 丑
        if (hour >= 3 && hour < 5) return 3;   // 寅
        if (hour >= 5 && hour < 7) return 4;   // 卯
        if (hour >= 7 && hour < 9) return 5;   // 辰
        if (hour >= 9 && hour < 11) return 6;  // 巳
        if (hour >= 11 && hour < 13) return 7; // 午
        if (hour >= 13 && hour < 15) return 8; // 未
        if (hour >= 15 && hour < 17) return 9; // 申
        if (hour >= 17 && hour < 19) return 10;// 酉
        if (hour >= 19 && hour < 21) return 11;// 戌
        return 12;                             // 亥
      };

      // 取得對應八卦物件
      const getBagua = (num) => {
        let index = parseInt(num) % 8;
        if (index === 0) index = 8;
        return BAGUA.find(b => b.number === index);
      };

      // 取得動爻 (1-6)
      const getMovingYao = (num) => {
        let yao = parseInt(num) % 6;
        if (yao === 0) yao = 6;
        return yao;
      };

      // 取得卦名
      const getGuaName = (shang, xia) => {
        const key = shang.name + xia.name;
        return SIXTY_FOUR_GUA[key] ? SIXTY_FOUR_GUA[key] : shang.name + xia.name;
      };

      // 解析五行生剋關係與分數
      const analyzeElements = (ti, yong) => {
        const relations = {
          '木': { sheng: '火', ke: '土', beiSheng: '水', beiKe: '金' },
          '火': { sheng: '土', ke: '金', beiSheng: '木', beiKe: '水' },
          '土': { sheng: '金', ke: '水', beiSheng: '火', beiKe: '木' },
          '金': { sheng: '水', ke: '木', beiSheng: '土', beiKe: '火' },
          '水': { sheng: '木', ke: '火', beiSheng: '金', beiKe: '土' }
        };

        if (ti.element === yong.element) {
          return { status: '體用比和 (吉)', desc: '體用五行屬性相同，力量均衡，代表事情平穩，順利無礙，得朋友或同輩相助。', score: 85 };
        }
        if (relations[yong.element].sheng === ti.element) {
          return { status: '用生體 (大吉)', desc: '用卦（外力/事）生助體卦（自身），代表謀事易成，有貴人相助，順水推舟。', score: 95 };
        }
        if (relations[ti.element].sheng === yong.element) {
          return { status: '體生用 (洩氣/小凶)', desc: '體卦去生助用卦，力量往外洩，代表自身付出多而收穫少，勞心費力，宜守不宜進。', score: 45 };
        }
        if (relations[yong.element].ke === ti.element) {
          return { status: '用克體 (大凶)', desc: '用卦克制體卦，代表外在環境或事物對自身產生極大壓力、阻礙或傷害，謀事多難，宜退避。', score: 20 };
        }
        if (relations[ti.element].ke === yong.element) {
          return { status: '體克用 (小吉/獲利)', desc: '體卦克制用卦，自身掌握主導權，代表事情雖然有重重困難，但經過努力最終可以克服並獲利。', score: 75 };
        }
        return { status: '未知', desc: '五行屬性交互影響複雜，宜審慎判斷。', score: 50 };
      };

      // 八卦線條對照表 (從初爻至三爻)
      const getTrigramLines = (name) => {
        switch (name) {
          case '乾': return [1, 1, 1];
          case '兌': return [1, 1, 0];
          case '離': return [1, 0, 1];
          case '震': return [1, 0, 0];
          case '巽': return [0, 1, 1];
          case '坎': return [0, 1, 0];
          case '艮': return [0, 0, 1];
          case '坤': return [0, 0, 0];
          default: return [1, 1, 1];
        }
      };

      // 取得六爻陣列 (初爻至上爻，共6爻)
      const getHexagramLines = (shangName, xiaName) => {
        return [...getTrigramLines(xiaName), ...getTrigramLines(shangName)];
      };

      // 根據6個爻的二進制陣列查找八卦
      const getTrigramFromLines = (lines) => {
        const key = lines.join(',');
        if (key === '1,1,1') return BAGUA.find(b => b.name === '乾');
        if (key === '1,1,0') return BAGUA.find(b => b.name === '兌');
        if (key === '1,0,1') return BAGUA.find(b => b.name === '離');
        if (key === '1,0,0') return BAGUA.find(b => b.name === '震');
        if (key === '0,1,1') return BAGUA.find(b => b.name === '巽');
        if (key === '0,1,0') return BAGUA.find(b => b.name === '坎');
        if (key === '0,0,1') return BAGUA.find(b => b.name === '艮');
        return BAGUA.find(b => b.name === '坤');
      };

      // 繁體字筆劃計算安全包裝
      const getCharStrokeCount = (char) => {
        if (typeof cnchar !== 'undefined') {
          try {
            const count = cnchar.stroke(char);
            if (typeof count === 'number') return count;
            if (Array.isArray(count) && count.length > 0) return count[0];
          } catch (e) {
            console.warn("cnchar count error for: " + char, e);
          }
        }
        // 萬一載入失敗，採用簡單的 Unicode 降級雜湊
        return (char.charCodeAt(0) % 12) + 3;
      };

      // 模擬硬幣落地音效
      const playCoinLandingSound = () => {
        try {
          if (!audioContextRef.current) {
            audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          const ctx = audioContextRef.current;
          if (ctx.state === 'suspended') ctx.resume();
          
          const now = ctx.currentTime;
          
          // 三枚銅錢陸續落地
          [0, 0.07, 0.14].forEach((delay) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(900 + Math.random() * 600, now + delay);
            gain.gain.setValueAtTime(0.04, now + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.12);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + delay);
            osc.stop(now + delay + 0.12);
          });
        } catch (e) {
          console.warn("播放落地音效失敗:", e);
        }
      };

      // 開始搖動銅錢
      const startShakingCoins = () => {
        if (isCoinShaking || isCoinTossing || tossStep >= 6) return;
        setIsCoinShaking(true);
        playDivinationSound();
      };

      // 擲出銅錢並計算這一爻
      const throwCoins = () => {
        if (!isCoinShaking || isCoinTossing) return;
        
        stopDivinationSound();
        setIsCoinShaking(false);
        setIsCoinTossing(true);
        
        // 隨機生成三枚硬幣正反 (0: 字/正面, 1: 幕/反面)
        const coins = [
          Math.random() > 0.5 ? 0 : 1,
          Math.random() > 0.5 ? 0 : 1,
          Math.random() > 0.5 ? 0 : 1
        ];
        
        // 計算落地時的 3D 旋轉角設定，以配合正反面
        const targets = coins.map((c) => {
          // c === 0 (正面/字) -> rotateY = 360*N; c === 1 (反面/幕) -> rotateY = 360*N + 180
          const rx = (720 + (c === 1 ? 180 : 0)) + 'deg';
          const ry = (720 + Math.floor(Math.random() * 4) * 90) + 'deg'; // 隨機旋轉角
          return { rx, ry };
        });
        
        setCoinTargetRotations(targets);
        setCurrentTossCoins(coins);
        
        // 模擬在動畫進行到一半著地時播落地音效
        setTimeout(() => {
          playCoinLandingSound();
        }, 550);
        
        // 動畫持續 1400 毫秒
        setTimeout(async () => {
          setIsCoinTossing(false);
          
          // 計算正面 (字/0) 的數量
          const headsCount = coins.filter(c => c === 0).length;
          let lineSymbol = '';
          let lineType = 1; // 1: 陽爻, 0: 陰爻
          let isMoving = false;
          
          if (headsCount === 3) {
            lineSymbol = '老陽 (動)';
            lineType = 1;
            isMoving = true;
          } else if (headsCount === 2) {
            lineSymbol = '少陰';
            lineType = 0;
            isMoving = false;
          } else if (headsCount === 1) {
            lineSymbol = '少陽';
            lineType = 1;
            isMoving = false;
          } else {
            lineSymbol = '老陰 (動)';
            lineType = 0;
            isMoving = true;
          }
          
          const newYao = {
            step: tossStep + 1,
            coins,
            symbol: lineSymbol,
            lineType,
            isMoving
          };
          
          const updatedHistory = [...coinTossHistory, newYao];
          setCoinTossHistory(updatedHistory);
          const nextStep = tossStep + 1;
          setTossStep(nextStep);
          
          // 若滿六爻，自動進行最終排卦與解讀
          if (nextStep === 6) {
            await calculateCoinHexagram(updatedHistory);
          }
        }, 1400);
      };

      // 根據投爻結果計算卦象與體用，啟動解卦
      const calculateCoinHexagram = async (history) => {
        setIsAnimating(true);
        playDivinationSound(); // 播最後計算的混音
        setAiAnalysis(null);
        setResult(null);

        // 等待 1.5 秒以讓使用者看清第六投結果
        await new Promise(resolve => setTimeout(resolve, 1500));

        // 取得 6 個爻的陰陽屬性 (初爻到上爻)
        const mainLines = history.map(h => h.lineType);
        
        // 取得上下卦
        const xiaGua = getTrigramFromLines([mainLines[0], mainLines[1], mainLines[2]]);
        const shangGua = getTrigramFromLines([mainLines[3], mainLines[4], mainLines[5]]);

        // 取得所有動爻位置 (1-indexed)
        const movingIndices = history.map((h, idx) => h.isMoving ? idx + 1 : null).filter(Boolean);

        let movingYao = movingIndices.length > 0 ? movingIndices[0] : 6;
        
        // 體卦與用卦
        const tiGua = movingYao <= 3 ? shangGua : xiaGua;

        const huXiaLines = [mainLines[1], mainLines[2], mainLines[3]];
        const huShangLines = [mainLines[2], mainLines[3], mainLines[4]];
        const huXiaGua = getTrigramFromLines(huXiaLines);
        const huShangGua = getTrigramFromLines(huShangLines);

        // 變卦 (將本卦中所有動爻取反；若無動爻則將我們預設的動爻取反)
        const bianLines = [...mainLines];

          movingIndices.forEach(idx => {
            bianLines[idx - 1] = bianLines[idx - 1] === 1 ? 0 : 1;
          });
        } else {
          bianLines[movingYao - 1] = bianLines[movingYao - 1] === 1 ? 0 : 1;
        }
        
        const bianXiaGua = getTrigramFromLines([bianLines[0], bianLines[1], bianLines[2]]);

        const bianAnalysis = analyzeElements(bianTiGua, bianYongGua);

          yongGua,

          huXiaGua,
          bianShangGua,
          bianXiaGua,

      // 開始起卦與運算
      const handleDivination = async () => {
        let n1, n2, n3;

        // 1. 根據起卦模式計算靈動數
        if (mode === 'number') {

        else if (mode === 'time') {
          const date = new Date(dateTime);
          const { yearBranchIndex, month, day } = getLunarDetails(date);
          const hourBranchIndex = getHourBranchIndex(date.getHours());
          
          n1 = yearBranchIndex + month + day;
          n2 = yearBranchIndex + month + day + hourBranchIndex;
          n3 = yearBranchIndex + month + day + hourBranchIndex;
          
          const yBranchName = BRANCHES[yearBranchIndex - 1];
          const hBranchName = BRANCHES[hourBranchIndex - 1];
          detailsText = `時間起卦：${date.getFullYear()}年 (農曆${yBranchName}年) ${month}月${day}日 ${date.getHours()}時 (${hBranchName}時)`;
        } 
        else if (mode === 'char') {
          const chineseChars = charText.replace(/[^\u4e00-\u9fa5]/g, '');
          if (chineseChars.length === 0) {
            alert("請至少輸入一個中文字！");
            return;
          }
          
          const now = new Date();
          const hourBranchIndex = getHourBranchIndex(now.getHours());
          const hBranchName = BRANCHES[hourBranchIndex - 1];
          
          if (chineseChars.length === 1) {
            // 單字占：字筆劃為上卦，時辰為下卦
            const stroke = getCharStrokeCount(chineseChars[0]);
            n1 = stroke;
            n2 = hourBranchIndex;
            n3 = stroke + hourBranchIndex;
            detailsText = `單字占「${chineseChars[0]}」(${stroke}劃) | 起卦時間：${hBranchName}時`;
          } else {
            // 多字占：字數拆平
            const len = chineseChars.length;
            const half1 = chineseChars.slice(0, Math.floor(len / 2));
            const half2 = chineseChars.slice(Math.floor(len / 2));
            
            const stroke1 = [...half1].reduce((sum, c) => sum + getCharStrokeCount(c), 0);
            const stroke2 = [...half2].reduce((sum, c) => sum + getCharStrokeCount(c), 0);
            
            n1 = stroke1;
            n2 = stroke2;
            n3 = stroke1 + stroke2 + hourBranchIndex;
            detailsText = `多字占「${half1}」[${stroke1}劃] ＆ 「${half2}」[${stroke2}劃] | 時辰：${hBranchName}時`;
          }
        } 
        else { // 'random' / 每日運勢
          n1 = Math.floor(Math.random() * 64) + 1;
          n2 = Math.floor(Math.random() * 64) + 1;
          n3 = Math.floor(Math.random() * 64) + 1;
          detailsText = `隨機感應起卦`;

        // 2. 開始撥放搖晃與噴灑金幣動畫

        await new Promise(resolve => setTimeout(resolve, 1800));

        // 4. 計算本卦、體卦、用卦
        const shangGua = getBagua(n1);
        const xiaGua = getBagua(n2);
        const movingYao = getMovingYao(n3); // 1-6 爻

        // 動爻在下卦 (1,2,3爻) -> 上卦為體，下卦為用。動爻在上卦 (4,5,6爻) -> 下卦為體，上卦為用。
        const tiGua = movingYao <= 3 ? shangGua : xiaGua;
        const yongGua = movingYao <= 3 ? xiaGua : shangGua;
        const basicAnalysis = analyzeElements(tiGua, yongGua);

        // 5. 計算互卦 (取本卦 2,3,4爻作下互卦，3,4,5爻作上互卦)
        const mainLines = getHexagramLines(shangGua.name, xiaGua.name);
        const huXiaLines = [mainLines[1], mainLines[2], mainLines[3]];
        const huShangLines = [mainLines[2], mainLines[3], mainLines[4]];

        const huShangGua = getTrigramFromLines(huShangLines);

        const bianLines = [...mainLines];

        const bianXiaGua = getTrigramFromLines([bianLines[0], bianLines[1], bianLines[2]]);

        // 變卦的體與用 (變卦中與本卦體卦同位置的為體，動爻轉變後的卦為變)

        const bianYongGua = movingYao <= 3 ? bianXiaGua : bianShangGua;

          yongGua,

          huXiaGua,
          bianShangGua,
          bianXiaGua,
          bianTiGua,
          bianYongGua,
          bianAnalysis,
          detailsText,

        };

        setIsAnimating(false);

        await runAiInterpretation(divinationResult);

      // 呼叫 Gemini 進行解卦
      const runAiInterpretation = async (divResult) => {
        const mainGuaName = getGuaName(divResult.shangGua, divResult.xiaGua);
        const huGuaName = getGuaName(divResult.huShangGua, divResult.huXiaGua);
        const bianGuaName = getGuaName(divResult.bianShangGua, divResult.bianXiaGua);
        
        const systemPrompt = `你是一位精通邵康節《梅花易數》與《易經》的命理大師。請根據起卦結果與用戶的問題，從事業、感情、財運、家庭、健康五個維度進行深度精確的分析，並給予具體可行的開運建議。請注意體用五行生剋關係。

        {

          起卦背景：${divResult.detailsText}
          【本卦】：${divResult.shangGua.nature}${divResult.xiaGua.nature}．${mainGuaName}卦 (體卦為 ${divResult.tiGua.name}${divResult.tiGua.element}，用卦為 ${divResult.yongGua.name}${divResult.yongGua.element}，斷語：${divResult.basicAnalysis.status})
          【互卦】：${divResult.huShangGua.nature}${divResult.huXiaGua.nature}．${huGuaName}卦 (代表發展過程)
          【變卦】：${divResult.bianShangGua.nature}${divResult.bianXiaGua.nature}．${bianGuaName}卦 (動爻在 ${divResult.movingYao} 爻，代表事情結局)

        const key = customApiKey || apiKey;

        // 定義離線解卦的統一處理函數
        const setOfflineFallback = async (errMessage) => {
          let modelDiagnostic = "";
          if (key) {
            try {
              // 嘗試取得該 API Key 支援的所有模型清單以供診斷

                if (diagData.models) {
                  const modelNames = diagData.models.map(m => m.name.replace('models/', ''));
                  modelDiagnostic = ` \n【您的金鑰可用模型清單】：${modelNames.join(', ')}`;
                }
              } else {
                const errData = await diagResponse.json().catch(() => ({}));
                modelDiagnostic = ` \n【金鑰可用模型檢測失敗】：${errData.error?.message || diagResponse.status}`;
              }
            } catch (diagErr) {
              console.warn("無法取得模型清單診斷資訊:", diagErr);
            }
          }

          const offlineReport = {
            career: `【本卦 - ${mainGuaName}】：${GUA_DESCRIPTIONS[mainGuaName] || '占卜成功。'}。體卦「${divResult.tiGua.name}${divResult.tiGua.element}」與用卦「${divResult.yongGua.name}${divResult.yongGua.element}」呈現 ${divResult.basicAnalysis.status}。${divResult.basicAnalysis.desc}`,
            love: `【互卦 - ${huGuaName}】：代表事件發展的中間過程。互卦為${huGuaName}卦，五行屬性為 ${divResult.huShangGua.element}與${divResult.huXiaGua.element}。過程曲折起伏，代表感情或人際關係在此時宜靜守、理智對待。`,
            wealth: `【變卦 - ${bianGuaName}】：代表本占卜的最終結局。變卦為${bianGuaName}卦，終卦體用互動呈 ${divResult.bianAnalysis.status}。意味著後續結局偏向 ${divResult.bianAnalysis.score >= 50 ? '吉順可成，利於獲益' : '辛勞付出，防範損耗'}。`,
            family: `動爻位於第 ${divResult.movingYao} 爻。動爻預示著家庭與生活環境中的轉折點，宜注意和氣生財，加強人際溝通與妥協。`,
            health: `本卦體卦為「${divResult.tiGua.name}${divResult.tiGua.element}」。${
              divResult.tiGua.element === '木' ? '春季氣旺，需防肝火太盛，注意作息。' :
              divResult.tiGua.element === '火' ? '夏季氣旺，需防心血管疾病與焦躁，注意調適壓力。' :
              divResult.tiGua.element === '金' ? '秋季氣旺，注意呼吸系統、肺部及大腸保養。' :
              divResult.tiGua.element === '水' ? '冬季氣旺，注意泌尿系統、腎臟及寒濕侵襲。' :
              '四季末土旺，需多注意腸胃消化系統保養。'
            }`,
            summary: errMessage 
              ? `【AI 連線失敗】已自動為您切換至離線易經卦辭分析。錯誤原因：${errMessage}${modelDiagnostic}`
              : `【離線版解卦】請點擊右上角設定 ⚙ 配置您的 Gemini API Key 以啟用更強大的 AI 深度解卦！`
          };
          
          setAiAnalysis(offlineReport);
          saveToHistory(divResult, offlineReport);
        };

        // 判斷金鑰是否為空或預留的佔位符
        const isPlaceholderKey = (k) => {
          if (!k) return true;
          const trimmed = k.trim();
          return trimmed === '' || trimmed === '系統自動注入' || trimmed === 'YOUR_API_KEY' || trimmed === 'undefined' || trimmed === 'null';
        };

        if (isPlaceholderKey(key)) {
          await setOfflineFallback(null);
          return;
        }

        let errorLogs = [];
        let breakAttempt = false;
        
        // 輪流嘗試 v1 和 v1beta 端點，以確保免費金鑰與付費金鑰皆能正確訪問
        const apiVersions = ['v1', 'v1beta'];
        
        for (let attempt = 0; attempt < 2; attempt++) {
          if (breakAttempt) break;
          for (const apiVersion of apiVersions) {
            try {
              let modelForEndpoint = selectedModel;
              if (apiVersion === 'v1') {
                if (selectedModel === 'gemini-flash-latest') modelForEndpoint = 'gemini-2.0-flash';
                else if (selectedModel === 'gemini-pro-latest') modelForEndpoint = 'gemini-2.5-pro';
                else if (selectedModel === 'gemini-1.5-flash') modelForEndpoint = 'gemini-2.0-flash';
                else if (selectedModel === 'gemini-1.5-pro') modelForEndpoint = 'gemini-2.5-pro';
              }
              const apiEndpoint = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelForEndpoint}:generateContent?key=${key}`;
              
              // AbortController 設置 30 秒超時，防止沙盒環境網路請求被阻斷時永久掛起
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), 30000);
              
              // 根據 apiVersion 動態調整 payload 結構，保證 v1 不會報 400 格式錯誤
              let requestBody = {};
              if (apiVersion === 'v1beta') {
                requestBody = {
                  contents: [{ parts: [{ text: userPrompt }] }],
                  systemInstruction: { parts: [{ text: systemPrompt }] },
                  generationConfig: { 
                    responseMimeType: "application/json",
                    temperature: 0.7
                  }
                };
              } else {
                // v1 端點：將 systemInstruction 合併入 prompt，移除 responseMimeType，防止 400 報錯
                const combinedPrompt = `${systemPrompt}\n\n[起卦與問題資料]：\n${userPrompt}\n\n請務必僅回覆純 JSON 字串，不要包含任何 markdown 標記（如 \`\`\`json 的格式）。`;
                requestBody = {
                  contents: [{ parts: [{ text: combinedPrompt }] }],
                  generationConfig: { 
                    temperature: 0.7
                  }
                };
              }

              const response = await fetch(apiEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                signal: controller.signal,
                body: JSON.stringify(requestBody)
              });
              
              clearTimeout(timeoutId);
              
              if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                const msg = errData.error?.message || "";
                if (response.status === 429 || msg.toLowerCase().includes("quota") || msg.toLowerCase().includes("rate limit")) {
                  throw new Error(`頻率超限 (429 Quota Exceeded)。請稍候 15 秒再試，或更換 API 金鑰或切換為其他解卦模型。`);
                }
                throw new Error(msg || `HTTP 錯誤狀態碼: ${response.status}`);
              }
              
              const data = await response.json();
              if (!data.candidates || data.candidates.length === 0) {
                throw new Error("Gemini API 回傳資料中無候選回答 (candidates)");
              }
              
              let text = data.candidates[0].content.parts[0].text;
              // 清理 markdown 的 ```json 或 ``` 標記
              text = text.replace(/```json/g, '').replace(/```/g, '').trim();
              
              const parsed = JSON.parse(text);
              setAiAnalysis(parsed);
              
              // 寫入歷史紀錄

              return; // 成功，結束函數
              
            } catch (e) {

              if (e.message.includes("429") || e.message.toLowerCase().includes("quota") || e.message.toLowerCase().includes("rate limit")) {

                break;
              }
            }
          }
          
          if (attempt < 1) {
            // 第一輪失敗，等待 1 秒再進行下一輪
            await new Promise(res => setTimeout(res, 1000));
          }
        }
        
        // 重試均失敗，降級為離線解卦並標記錯誤

      };

        };

      };

        setAiAnalysis(item.aiAnalysis);

        setMode(item.mode);
        setSelectedHistory(item.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDeleteHistory = (id, e) => {
        e.stopPropagation();
        setHistory(prev => prev.filter(item => item.id !== id));
        if (selectedHistory === id) {
          handleReset();
        }
      };

        setAiAnalysis(null);

        setQuestion('');

        setIsCoinTossing(false);

        const textArea = document.createElement("textarea");

                      </div>
                      <p className="text-neutral-400 text-xs text-justify">
                        六次投擲完成後，系統會提取前三次為下卦（內卦），後三次為上卦（外卦）。老陽與老陰為「動爻」（變爻），所處的位置即為卦象生變的關鍵，預示了事物當前的本質（本卦）以及未來的演變結局（變卦）。
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* 設定彈窗 (API Key Settings) */}
          {showSettings && (
            <div className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
              <SettingsModal 
                currentKey={customApiKey} 
                currentModel={selectedModel}
                onSave={saveSettings} 
                onClose={() => setShowSettings(false)} 
              />
            </div>
          )}

        </div>
      );
    };

    // 卦象展示卡片組件 (本卦、互卦、變卦之六爻繪製)
    const HexagramCard = ({ title, subTitle, shangGua, xiaGua, lines, movingYao, isMain, tiGua, yongGua, isChangedGua, getGuaName }) => {
      
      const guaName = getGuaName(shangGua, xiaGua);

      return (
        <div className="flex flex-col items-center bg-black/30 border border-white/5 p-4 sm:p-5 rounded-2xl relative overflow-hidden select-none">
          
          <div className="text-center mb-3">
            <span className="text-[10px] text-neutral-500 font-serif block">{subTitle}</span>
            <span className="text-xs font-bold text-gold-400 font-serif tracking-widest">{title}</span>
          </div>

          {/* 畫出六爻 (從上往下畫，爻順序是上爻(5)在頂，初爻(0)在底) */}
          <div className="flex flex-col gap-2.5 w-full py-4 max-w-[120px] items-center justify-center">
            {lines.slice().reverse().map((line, revIdx) => {
              const actualIdx = 5 - revIdx; // 爻在原 lines 陣列中的真正索引 (0-5)
              const isMovingLine = movingYao !== undefined && (actualIdx === movingYao - 1);
              
              // 決定爻的顏色與光芒樣式
              let lineStyle = "h-2.5 rounded-sm transition-all duration-300 ";
              if (isMovingLine) {
                lineStyle += "bg-gradient-to-r from-yellow-400 via-gold-300 to-yellow-500 animate-yao-glow ";
              } else {
                lineStyle += "bg-gradient-to-r from-gold-600 via-gold-400 to-gold-600 ";
              }

              return (
                <div key={actualIdx} className="w-full relative flex items-center justify-center h-4">
                  {line === 1 ? (
                    /* 陽爻 (整條) */
                    <div className={`w-full ${lineStyle}`} />
                  ) : (
                    /* 陰爻 (斷成兩條) */
                    <div className="w-full flex justify-between">
                      <div className={`w-[45%] ${lineStyle}`} />
                      <div className={`w-[45%] ${lineStyle}`} />
                    </div>
                  )}
                  {/* 動爻的標識 */}
                  {isMovingLine && (
                    <span className="absolute -right-5 text-[8px] text-yellow-400 font-bold animate-pulse">
                      {isChangedGua ? '變' : '動'}
                    </span>
                  )}
                </div>
              );
            })}
          </div>

          {/* 卦名 */}
          <div className="text-center mt-3 space-y-1">
            <span className="text-lg font-bold text-neutral-200 font-serif tracking-tighter">
              {shangGua.nature}{guaName === '乾' || guaName === '坤' || guaName === '震' || guaName === '巽' || guaName === '坎' || guaName === '離' || guaName === '艮' || guaName === '兌' ? '' : xiaGua.nature}
            </span>
            <span className="text-xs text-gold-500/80 font-serif block">
              {guaName}卦
            </span>
          </div>

          {/* 體用標籤 */}
          {tiGua && yongGua && (
            <div className="mt-3 w-full flex flex-col gap-1 text-[9px] text-center border-t border-white/5 pt-2">
              <div className="flex justify-between px-1">
                <span className="text-neutral-500 font-serif">上卦:</span>
                <span className={`font-bold font-serif ${tiGua.name === shangGua.name ? 'text-jade-400' : 'text-amber-500/80'}`}>
                  {shangGua.name}({shangGua.element}) {tiGua.name === shangGua.name ? '體' : '用'}
                </span>
              </div>
              <div className="flex justify-between px-1">
                <span className="text-neutral-500 font-serif">下卦:</span>
                <span className={`font-bold font-serif ${tiGua.name === xiaGua.name ? 'text-jade-400' : 'text-amber-500/80'}`}>
                  {xiaGua.name}({xiaGua.element}) {tiGua.name === xiaGua.name ? '體' : '用'}
                </span>
              </div>
            </div>
          )}

          {/* 互卦的自然屬性 */}
          {!tiGua && (
            <div className="mt-3 w-full flex flex-col gap-1 text-[9px] text-center border-t border-white/5 pt-2 text-neutral-400 font-serif">
              <div>上互: {shangGua.name}({shangGua.element})</div>
              <div>下互: {xiaGua.name}({xiaGua.element})</div>
            </div>
          )}

        </div>
      );
    };

    // AI分析項目卡片組件
    const AnalysisCard = ({ icon, title, content, loading, className = "" }) => {
      return (
        <div className={`glass-card p-5 rounded-[1.8rem] transition-all hover:border-gold-500/30 ${className}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">{icon}</span>
            <span className="font-bold text-xs text-gold-300 font-serif tracking-wider">{title}</span>
          </div>
          {loading ? (
            <div className="space-y-2.5 animate-pulse py-2">
              <div className="h-2 bg-white/10 rounded w-full"></div>
              <div className="h-2 bg-white/10 rounded w-5/6"></div>
              <div className="h-2 bg-white/10 rounded w-2/3"></div>
            </div>
          ) : (
            <p className="text-neutral-300 text-xs leading-relaxed font-serif text-justify">
              {content}
            </p>
          )}
        </div>
      );
    };

    // 金鑰與模型設定彈窗組件
    const SettingsModal = ({ currentKey, currentModel, onSave, onClose }) => {
      const [key, setKey] = useState(currentKey);
      const [model, setModel] = useState(() => {
        if (currentModel === 'gemini-1.5-flash') return 'gemini-2.0-flash';
        if (currentModel === 'gemini-1.5-pro') return 'gemini-2.5-pro';
        if (currentModel === 'gemini-flash-latest') return 'gemini-2.0-flash';
        if (currentModel === 'gemini-pro-latest') return 'gemini-2.5-pro';
        return currentModel || 'gemini-2.0-flash';
      });

      return (
        <div className="glass-card max-w-sm w-full rounded-[2.5rem] p-6 space-y-6 relative animate-in zoom-in-95 duration-200">
          <button 
            onClick={onClose}
            className="absolute top-4 right-4 text-neutral-400 hover:text-neutral-200 p-2"
          >
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
          
          <div className="text-center space-y-2">
            <h3 className="text-base font-bold font-serif text-gold-300">⚙ 金鑰與 AI 模型配置</h3>
            <div className="h-px w-8 bg-gold-500/20 mx-auto"></div>
          </div>

          <div className="space-y-4">
            {/* Gemini API Key */}
            <div className="space-y-1">
              <label className="text-[11px] text-neutral-400 block ml-1">Gemini API 金鑰：</label>
              <input 
                type="password" 
                value={key}
                onChange={(e) => setKey(e.target.value)}
                className="w-full bg-black/60 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-gold-500/40 text-xs text-gold-200 placeholder-neutral-700"
                placeholder={apiKey ? "已自動注入環境金鑰" : "請貼入您的 AI Studio 金鑰"}
              />
              {!key && !apiKey && (
                <div className="text-[9px] text-amber-500/70 ml-1 italic font-serif leading-tight">
                  ※ 未填入金鑰時，系統會以傳統五行生剋與周易卦意進行基礎解卦。
                </div>
              )}
            </div>

            {/* 模型選擇 */}
            <div className="space-y-1">
              <label className="text-[11px] text-neutral-400 block ml-1">選擇 AI 解卦模型：</label>
              <select
                value={model}
                onChange={(e) => setModel(e.target.value)}
                className="w-full bg-black/60 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-gold-500/40 text-xs text-gold-200"
              >
                <option value="gemini-2.0-flash">Gemini 2.0 Flash (推薦 - 高速且支援最廣)</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (推薦 - 最新主力模型)</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro (高推理深度 - 適合複雜分析)</option>
                <option value="gemini-3.5-flash">Gemini 3.5 Flash (新世代中階)</option>
                <option value="gemini-flash-latest">Gemini 1.5 Flash (舊版備用)</option>
                <option value="gemini-pro-latest">Gemini 1.5 Pro (舊版備用)</option>
              </select>
            </div>

            {/* 儲存按鈕 */}
            <button
              onClick={() => onSave(key, model)}
              className="w-full bg-gradient-to-r from-gold-700 to-gold-500 text-black font-bold py-3 rounded-xl hover:brightness-110 transition-all text-xs font-serif"
            >
              儲存配置
            </button>
          </div>
        </div>
      );
    };

    // 啟動渲染
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<PlumBlossomApp />);
  </script>

  <!-- Register Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker Registered successfully! Scope:', reg.scope))
          .catch((err) => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
